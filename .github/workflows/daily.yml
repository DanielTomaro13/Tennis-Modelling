name: daily-build

# Rebuild ratings + predictions and republish the site every 3 hours.
on:
  schedule:
    - cron: "0 */3 * * *"  # every 3 hours, on the hour (UTC)
  workflow_dispatch: {}    # allow manual runs

permissions:
  contents: write

concurrency:
  group: daily-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pipeline
        run: python -m src.run_daily

      - name: Commit refreshed site + reports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs reports data/fixtures.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily rebuild ($(date -u +%Y-%m-%d))"
            git push
          fi
