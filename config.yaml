# Tennis-Modelling configuration
# All tunable parameters for the public modelling pipeline live here.

tours:
  - atp
  - wta

# Jeff Sackmann Match Charting Project — the public data backbone (raw CSV over HTTPS).
# tour -> { matches metadata file, per-match Overview stats, point-by-point files }.
data:
  base_url: "https://raw.githubusercontent.com/JeffSackmann/tennis_MatchChartingProject/master"
  files:
    atp:
      matches: "charting-m-matches.csv"
      overview: "charting-m-stats-Overview.csv"
      points: ["charting-m-points-to-2009.csv", "charting-m-points-2010s.csv", "charting-m-points-2020s.csv"]
    wta:
      matches: "charting-w-matches.csv"
      overview: "charting-w-stats-Overview.csv"
      points: ["charting-w-points-to-2009.csv", "charting-w-points-2010s.csv", "charting-w-points-2020s.csv"]
  # Earliest match date (YYYYMMDD) to ingest. Older matches still inform priors
  # but recency weighting makes recent form dominate.
  start_date: 20100101
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  # Derive win/loss results by streaming the (large) point-by-point files.
  # Opt-in: needed for Elo and the backtest, but not for the daily prediction run.
  derive_winners: false

surfaces:
  - Hard
  - Clay
  - Grass

# ---------------------------------------------------------------------------
# Serve/return profile parameters
# ---------------------------------------------------------------------------
features:
  # Exponential recency half-life in days (weight halves every N days).
  half_life_days: 365
  # Shrinkage: equivalent prior sample size (service points) pulling a player
  # toward the tour/surface mean. Higher = more regression for small samples.
  prior_svpt: 250
  # Minimum service points before a player gets a non-default profile.
  # Lower = broader coverage (more scraped fixtures resolve) at some noise cost.
  min_svpt: 60
  # Number of opponent-adjustment passes (iterative serve/return strength).
  adjust_iterations: 3

# ---------------------------------------------------------------------------
# Elo parameters
# ---------------------------------------------------------------------------
elo:
  initial: 1500.0
  # K-factor schedule: K = k_base / (matches_played + k_offset)^k_shape  (FiveThirtyEight-style decay)
  k_base: 250.0
  k_offset: 5.0
  k_shape: 0.4
  # Multiply K for higher-stakes matches.
  k_best_of_5_mult: 1.1
  # Weight blending surface-specific Elo with overall Elo for the prediction.
  surface_weight: 0.5
  # Regression toward the mean applied at the start of each new season.
  season_regression: 0.20

# ---------------------------------------------------------------------------
# Match simulation engine
# ---------------------------------------------------------------------------
sim:
  monte_carlo_iterations: 20000
  # The headline win prob is a logit blend of the serve/return sim with a
  # results-based surface Elo. The Elo is independent of the (compressed)
  # serve/return stats and separates skill gaps far better — holdout testing puts
  # the optimum at pure Elo (log-loss 0.515 vs 0.562 sim-only on ATP), so we
  # weight it heavily, keeping a little sim weight for players with thin Elo
  # history. The serve/return sim is then ANCHORED to that win prob so every
  # derived market (sets, games, handicaps) stays consistent with it.
  # See scripts/diagnose.py and scripts/diagnose_elo.py.
  elo_weight_atp: 0.85
  elo_weight_wta: 0.85
  # A player with fewer than this many rated matches sits near the Elo init, so
  # the win prob (and any "value edge" off it) is unreliable — the Value page
  # flags those matchups as thin and hides them by default.
  thin_elo_matches: 10
  # Total-games over/under lines to price.
  totals_lines: [20.5, 21.5, 22.5, 23.5]

# ---------------------------------------------------------------------------
# Fixtures
# ---------------------------------------------------------------------------
fixtures:
  schedule_url: "https://www.tennis.com/"
  # ESPN hidden JSON API (one endpoint returns both tours' singles + doubles).
  espn_url: "https://site.api.espn.com/apis/site/v2/sports/tennis/atp/scoreboard"
  manual_file: "data/manual_fixtures.csv"
  # Only include scheduled matches within this many days (keeps the board relevant).
  days_ahead: 8
  # Fuzzy name-match threshold (0-1) when mapping schedule names to player ids.
  match_threshold: 0.82

paths:
  models_dir: "models"
  reports_dir: "reports"
  docs_dir: "docs"
  docs_data_dir: "docs/data"

# ---------------------------------------------------------------------------
# Backtest
# ---------------------------------------------------------------------------
backtest:
  holdout_start_year: 2024
